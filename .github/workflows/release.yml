name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  test:
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v5

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go/go.mod
          cache-dependency-path: go/go.sum

      - name: Install just
        uses: taiki-e/install-action@v2
        with:
          tool: just

      - name: Go vet
        run: just lint-go

      - name: Go test
        run: just test-go

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip

      - name: Install Python deps
        run: pip install -r requirements.txt just

      - name: Run Python tests
        run: just test --no-header -q

  release:
    needs: [test]
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go/go.mod

      - name: Install just
        uses: taiki-e/install-action@v2
        with:
          tool: just

      - name: Build warden.exe
        env:
          TAG: ${{ github.ref_name }}
        run: just build

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Python deps
        run: pip install -r requirements.txt pyinstaller

      - name: Build warden-backend.exe
        run: just build-backend

      - name: Generate release notes
        shell: python
        env:
          CURRENT_TAG: ${{ github.ref_name }}
        run: |
          import os, re, subprocess

          EMOJI_MAP = {
              "feat":     ("✨", "New Features"),
              "fix":      ("\U0001f41b", "Bug Fixes"),
              "perf":     ("⚡", "Performance"),
              "refactor": ("♻️", "Refactoring"),
              "test":     ("\U0001f9ea", "Tests"),
              "docs":     ("\U0001f4da", "Documentation"),
              "ci":       ("\U0001f477", "CI/CD"),
              "build":    ("\U0001f4e6", "Build"),
              "style":    ("\U0001f3a8", "Style"),
              "chore":    ("\U0001f527", "Chores"),
          }

          def run(cmd):
              return subprocess.run(cmd, capture_output=True, text=True, shell=True).stdout.strip()

          current = os.environ.get("CURRENT_TAG", "")
          tags = [t for t in run("git tag --sort=-version:refname").splitlines() if t and t != current]
          prev = tags[0] if tags else ""
          range_ = f"{prev}..{current}" if prev else current
          commits = [l for l in run(f"git log {range_} --pretty=format:%s --no-merges").splitlines() if l.strip()]

          groups, breaking, other = {}, [], []
          for msg in commits:
              m = re.match(r"^(\w+)(?:\(([^)]+)\))?(!)?:\s*(.+)$", msg)
              if m:
                  type_, scope, bang, desc = m.groups()
                  label = f"**{scope}:** {desc}" if scope else desc
                  if bang:
                      breaking.append(label)
                  if type_.lower() in EMOJI_MAP:
                      groups.setdefault(type_.lower(), []).append(label)
                  else:
                      other.append(desc)
              else:
                  other.append(msg)

          lines = []
          if breaking:
              lines += [f"### \U0001f4a5 Breaking Changes", *[f"- {b}" for b in breaking], ""]
          for type_, (emoji, title) in EMOJI_MAP.items():
              if type_ in groups:
                  lines += [f"### {emoji} {title}", *[f"- {m}" for m in groups[type_]], ""]
          if other:
              lines += [f"### \U0001f4cc Other", *[f"- {m}" for m in other], ""]
          while lines and not lines[-1]:
              lines.pop()

          notes = "\n".join(lines) if lines else "No changes."
          with open("release_notes.md", "w", encoding="utf-8") as f:
              f.write(notes)

      - name: Package release zip
        shell: pwsh
        env:
          TAG: ${{ github.ref_name }}
        run: |
          $folder = "warden-$env:TAG-windows-x64"
          New-Item -ItemType Directory -Path $folder | Out-Null
          Copy-Item warden.exe "$folder\warden.exe"
          Copy-Item dist\warden-backend.exe "$folder\warden-backend.exe"

          $readme = @"
          # warden $env:TAG

          AI agent that controls your Windows PC via natural language.

          ## Setup

          1. Run **warden.exe** — a setup wizard will open on first launch
          2. Enter your model, API URL, and API key (get a free key at openrouter.ai)
          3. Start chatting

          ## Files

          | File | Description |
          |---|---|
          | ``warden.exe`` | TUI frontend — run this |
          | ``warden-backend.exe`` | Python backend (started automatically) |

          Keep both files in the same folder.

          ## Controls

          | Key | Action |
          |---|---|
          | Enter | Send message |
          | Esc | Interrupt stream |
          | Esc x2 | Force-stop |
          | Shift+Tab | Toggle Ask / Auto mode |
          | Tab | Complete slash command |
          | Up / Down | Scroll during stream / navigate history |
          | Scroll wheel | Scroll (5 lines per tick) |
          | Ctrl+W | Delete last word in input |
          | Ctrl+C | Exit |

          ## Source

          https://github.com/elev1e1nSure/warden
          "@

          $readme | Out-File -FilePath "$folder\README.md" -Encoding utf8

          Compress-Archive -Path $folder -DestinationPath "$folder.zip"

      - name: Generate checksums
        shell: pwsh
        env:
          TAG: ${{ github.ref_name }}
        run: |
          $zip = "warden-$env:TAG-windows-x64.zip"
          $hash = (Get-FileHash $zip -Algorithm SHA256).Hash.ToLower()
          "$hash  $zip" | Out-File -FilePath "SHA256SUMS.txt" -Encoding ascii

      - name: Create GitHub release
        shell: pwsh
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ github.ref_name }}
        run: |
          $zip = "warden-$env:TAG-windows-x64.zip"
          gh release create $env:TAG `
            --title $env:TAG `
            --notes-file release_notes.md `
            $zip SHA256SUMS.txt
