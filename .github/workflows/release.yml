name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  test:
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v5

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go/go.mod
          cache-dependency-path: go/go.sum

      - name: Install just
        uses: taiki-e/install-action@v2
        with:
          tool: just

      - name: Go vet
        run: just lint-go

      - name: Go test
        run: just test-go

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip

      - name: Install Python deps
        run: pip install -r requirements.txt

      - name: Run Python tests
        run: just test --no-header -q

  release:
    needs: [test]
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go/go.mod

      - name: Install just
        uses: taiki-e/install-action@v2
        with:
          tool: just

      - name: Build warden.exe
        env:
          TAG: ${{ github.ref_name }}
        run: just build

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Python deps
        run: pip install -r requirements.txt pyinstaller

      - name: Build warden-backend.exe
        run: just build-backend

      - name: Generate release notes
        shell: python
        env:
          CURRENT_TAG: ${{ github.ref_name }}
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
        run: |
          import os, subprocess, json
          from urllib.request import Request, urlopen

          def run(cmd):
              return subprocess.run(cmd, capture_output=True, text=True, shell=True).stdout.strip()

          current = os.environ.get("CURRENT_TAG", "")
          tags = [t for t in run("git tag --sort=-version:refname").splitlines() if t and t != current]
          prev = tags[0] if tags else ""
          range_ = f"{prev}..{current}" if prev else current

          raw = run(f"git log {range_} --pretty=format:'%s' --no-merges")
          commits = "\n".join(raw.splitlines()[:200])

          def fallback(text):
              with open("release_notes.md", "w", encoding="utf-8") as f:
                  f.write(text if text.strip() else "No changes.")

          api_key = os.environ.get("OPENROUTER_API_KEY", "").strip()
          if not api_key or not commits.strip():
              fallback(commits)
              print("No API key or no commits — wrote raw commit list.")
          else:
              system = (
                  "You write release notes. Turn git commits into a brief, human-readable changelog.\n"
                  "\n"
                  "RULES:\n"
                  "- NO emojis, icons, or unicode decorations.\n"
                  "- Group related changes under short markdown headings (## ...). "
                  "Do not group by commit type.\n"
                  "- Each bullet: one sentence about what changed for the user. "
                  "No implementation details, no file names, no code references.\n"
                  "- Skip: CI/CD, tests, style, docs, dependency bumps, internal refactoring.\n"
                  "- Skip minor or cosmetic changes.\n"
                  "- Max 3-4 bullets per heading. Merge similar changes into one bullet.\n"
                  "- If nothing is user-facing, output exactly: No user-facing changes.\n"
                  "- Output ONLY the changelog. No preamble, no greeting, no sign-off."
              )

              user_msg = "Commits since " + (prev or "the first tag") + ":\n\n" + commits

              payload = json.dumps({
                  "model": "deepseek/deepseek-v4-flash",
                  "messages": [
                      {"role": "system", "content": system},
                      {"role": "user", "content": user_msg}
                  ],
                  "temperature": 0.2,
                  "max_tokens": 800
              }).encode()

              req = Request("https://openrouter.ai/api/v1/chat/completions", data=payload, headers={
                  "Authorization": f"Bearer {api_key}",
                  "Content-Type": "application/json",
              })

              try:
                  with urlopen(req, timeout=30) as resp:
                      body = json.loads(resp.read())
                  notes = body["choices"][0]["message"]["content"].strip()
                  if notes.startswith("```"):
                      lines = notes.split("\n")
                      notes = "\n".join(lines[1:]).rstrip("`").strip()
                  with open("release_notes.md", "w", encoding="utf-8") as f:
                      f.write(notes)
                  print("AI release notes generated.")
              except Exception as e:
                  print(f"AI generation failed: {e}")
                  fallback(commits)

      - name: Package release zip
        shell: pwsh
        env:
          TAG: ${{ github.ref_name }}
        run: |
          $folder = "warden-$env:TAG-windows-x64"
          New-Item -ItemType Directory -Path $folder | Out-Null
          Copy-Item warden.exe "$folder\warden.exe"
          Copy-Item dist\warden-backend.exe "$folder\warden-backend.exe"

          $readme = @"
          # warden $env:TAG

          AI agent that controls your Windows PC via natural language.

          ## Setup

          1. Run **warden.exe** — a setup wizard will open on first launch
          2. Enter your model, API URL, and API key (get a free key at openrouter.ai)
          3. Start chatting

          ## Files

          | File | Description |
          |---|---|
          | ``warden.exe`` | TUI frontend — run this |
          | ``warden-backend.exe`` | Python backend (started automatically) |

          Keep both files in the same folder.

          ## Controls

          | Key | Action |
          |---|---|
          | Enter | Send message |
          | Esc | Interrupt stream |
          | Esc x2 | Force-stop |
          | Shift+Tab | Toggle Ask / Auto mode |
          | Tab | Complete slash command |
          | Up / Down | Scroll during stream / navigate history |
          | Scroll wheel | Scroll (5 lines per tick) |
          | Ctrl+W | Delete last word in input |
          | Ctrl+C | Exit |

          ## Source

          https://github.com/elev1e1nSure/warden
          "@

          $readme | Out-File -FilePath "$folder\README.md" -Encoding utf8

          Compress-Archive -Path $folder -DestinationPath "$folder.zip"

      - name: Create GitHub release
        shell: pwsh
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ github.ref_name }}
        run: |
          $zip = "warden-$env:TAG-windows-x64.zip"
          gh release create $env:TAG `
            --title $env:TAG `
            --notes-file release_notes.md `
            $zip
