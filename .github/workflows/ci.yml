name: CI

on:
  push:
    branches: ['**']
  pull_request:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  python:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ['3.11', '3.12']

    steps:
      - uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install just
        uses: taiki-e/install-action@v2
        with:
          tool: just

      - name: Install system deps
        run: sudo apt-get update && sudo apt-get install -y xvfb

      - name: Install Python deps
        run: pip install -r requirements.txt

      - name: Lint Python
        run: just lint-py

      - name: Check Python formatting
        run: just fmt-py

      - name: Run tests
        run: xvfb-run --auto-servernum just test --no-header -q

      - name: Upload coverage reports
        if: matrix.python-version == '3.11'
        uses: actions/upload-artifact@v4
        with:
          name: coverage-reports
          path: |
            htmlcov/
            coverage.json

  go:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v5

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache-dependency-path: go.sum

      - name: Install just
        uses: taiki-e/install-action@v2
        with:
          tool: just

      - name: Check formatting
        run: just fmt-go-check

      - name: Vet
        run: just lint-go

      - name: Build
        run: just build-check

      - name: Test
        run: just test-go -coverprofile=cover.out

      - name: Check coverage threshold
        run: |
          coverage=$(go tool cover -func=cover.out | grep total | awk '{print $3}' | tr -d '%')
          echo "Go coverage: ${coverage}%"
          if (( $(echo "$coverage < 80" | bc -l) )); then
            echo "Coverage $coverage% is below 80%"
            exit 1
          fi

      - name: Upload Go coverage
        uses: actions/upload-artifact@v4
        with:
          name: go-coverage
          path: cover.out
