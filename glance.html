<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Glance</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet" />
<style>
  *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: 'Inter', sans-serif;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    background: linear-gradient(135deg, #0f0c29, #302b63, #24243e);
    background-attachment: fixed;
    padding: 1.5rem;
    position: relative;
    overflow-x: hidden;
  }

  /* floating orbs */
  body::before, body::after {
    content: '';
    position: fixed;
    border-radius: 50%;
    filter: blur(80px);
    z-index: 0;
    pointer-events: none;
  }
  body::before {
    width: 400px; height: 400px;
    background: rgba(14, 165, 233, 0.15);
    top: -100px; right: -100px;
  }
  body::after {
    width: 350px; height: 350px;
    background: rgba(249, 115, 22, 0.12);
    bottom: -80px; left: -80px;
  }

  .glass {
    background: rgba(255, 255, 255, 0.06);
    backdrop-filter: blur(18px);
    -webkit-backdrop-filter: blur(18px);
    border: 1px solid rgba(255, 255, 255, 0.10);
    border-radius: 2rem;
    box-shadow: 0 8px 32px rgba(0, 0, 0, 0.25);
  }

  .card {
    position: relative;
    z-index: 1;
    width: 100%;
    max-width: 520px;
    padding: 3rem 2.5rem;
    text-align: center;
    transition: transform 0.3s ease, box-shadow 0.3s ease;
  }
  .card:hover {
    transform: translateY(-4px);
    box-shadow: 0 12px 48px rgba(0, 0, 0, 0.35);
  }

  .badge {
    display: inline-block;
    padding: 0.35rem 1rem;
    border-radius: 999px;
    background: rgba(14, 165, 233, 0.15);
    border: 1px solid rgba(14, 165, 233, 0.20);
    color: #7dd3fc;
    font-size: 0.75rem;
    font-weight: 600;
    letter-spacing: 0.05em;
    text-transform: uppercase;
    margin-bottom: 1.5rem;
  }

  h1 {
    font-size: clamp(2.5rem, 6vw, 4rem);
    font-weight: 800;
    color: #fff;
    line-height: 1.1;
    letter-spacing: -0.03em;
    margin-bottom: 1rem;
  }

  p {
    color: rgba(255, 255, 255, 0.6);
    font-size: 1.05rem;
    line-height: 1.7;
    max-width: 36ch;
    margin: 0 auto 2.25rem;
  }

  .benefits {
    list-style: none;
    display: flex;
    flex-direction: column;
    gap: 0.75rem;
    margin-bottom: 2.5rem;
    text-align: left;
  }
  .benefits li {
    color: rgba(255, 255, 255, 0.75);
    font-size: 0.95rem;
    font-weight: 400;
    display: flex;
    align-items: center;
    gap: 0.75rem;
  }
  .benefits li svg {
    flex-shrink: 0;
    width: 20px;
    height: 20px;
  }

  .btn {
    display: inline-flex;
    align-items: center;
    gap: 0.5rem;
    padding: 0.9rem 2.5rem;
    border-radius: 999px;
    font-family: 'Inter', sans-serif;
    font-size: 1rem;
    font-weight: 600;
    border: none;
    cursor: pointer;
    transition: all 0.25s ease;
    text-decoration: none;
  }

  .btn-primary {
    background: linear-gradient(135deg, #0EA5E9, #38BDF8);
    color: #fff;
    box-shadow: 0 4px 20px rgba(14, 165, 233, 0.30);
  }
  .btn-primary:hover {
    box-shadow: 0 6px 28px rgba(14, 165, 233, 0.45);
    transform: translateY(-2px);
  }
  .btn-primary:focus-visible {
    outline: 2px solid #38BDF8;
    outline-offset: 3px;
  }

  .footer {
    position: relative;
    z-index: 1;
    margin-top: 2.5rem;
    color: rgba(255, 255, 255, 0.3);
    font-size: 0.8rem;
  }
  .footer a {
    color: rgba(255, 255, 255, 0.4);
    text-decoration: none;
    transition: color 0.2s;
  }
  .footer a:hover { color: rgba(255, 255, 255, 0.7); }

  @media (max-width: 480px) {
    .card { padding: 2rem 1.5rem; border-radius: 1.5rem; }
    .benefits li { font-size: 0.9rem; }
  }

  @media (prefers-reduced-motion: reduce) {
    *, *::before, *::after {
      animation-duration: 0.01ms !important;
      transition-duration: 0.01ms !important;
    }
  }
</style>
</head>
<body>

<div class="card glass">
  <span class="badge">✦ now in beta</span>
  <h1>Glance</h1>
  <p>Minimal, fast, beautiful — just what you need. No clutter, no noise.</p>

  <ul class="benefits">
    <li>
      <svg viewBox="0 0 24 24" fill="none" stroke="#7dd3fc" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M20 6L9 17l-5-5"/></svg>
      Clean & focused design
    </li>
    <li>
      <svg viewBox="0 0 24 24" fill="none" stroke="#7dd3fc" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M20 6L9 17l-5-5"/></svg>
      Lightweight & fast
    </li>
    <li>
      <svg viewBox="0 0 24 24" fill="none" stroke="#7dd3fc" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M20 6L9 17l-5-5"/></svg>
      Open source
    </li>
  </ul>

  <button class="btn btn-primary" onclick="alert('Let\'s go!')">
    Get Started
    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M5 12h14"/><path dM12 5l7 7-7 7"/></svg>
  </button>
</div>

<div class="footer">
  © 2026 <a href="#">Glance</a> — crafted with care
</div>

</body>
</html>
