[tool.ruff]
target-version = "py311"
line-length = 120

[tool.ruff.lint]
select = ["E", "F", "I", "N", "W", "UP", "B", "SIM"]

[tool.ruff.lint.per-file-ignores]
"agent/test_*.py" = ["SIM"]
"agent/tools/__init__.py" = ["F401"]
"agent/prompt.py" = ["E501"]
"agent/tools/archive.py" = ["E501"]
"agent/tools/browser.py" = ["E501"]
"agent/tools/lsp.py" = ["E501"]
"agent/tools/patch.py" = ["E501"]
"agent/tools/screen.py" = ["E501"]
"agent/conftest.py" = ["SIM"]

[tool.ruff.format]
quote-style = "double"

[tool.pytest.ini_options]
asyncio_mode = "auto"
testpaths = ["agent"]
