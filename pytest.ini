[pytest]
asyncio_mode = auto
testpaths = agent
tmp_path_retention_count = 1
addopts = --cov=agent --cov-report=term-missing --cov-report=html:htmlcov --cov-report=json:coverage.json --basetemp=.tmp/pytest

[coverage:run]
source = agent
branch = true
omit =
    agent/__pycache__/*
    agent/safety/__pycache__/*

[coverage:report]
show_missing = true
